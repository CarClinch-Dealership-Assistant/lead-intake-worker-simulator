name: lead-intake-testing
services:
  servicebus:
    container_name: "servicebus-emulator"
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    pull_policy: always
    volumes:
      - "${CONFIG_PATH}:/ServiceBus_Emulator/ConfigFiles/Config.json"
    ports:
      - "5672:5672"
      - "5300:${EMULATOR_HTTP_PORT:-5300}"
    environment:
      SQL_SERVER: mssql
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      ACCEPT_EULA: ${ACCEPT_EULA}
      EMULATOR_HTTP_PORT: ${EMULATOR_HTTP_PORT:-5300}
      SQL_WAIT_INTERVAL: 15
    depends_on:
      - mssql
    networks:
      sb-emulator:
        aliases:
          - "sb-emulator"

  mssql:
    container_name: "mssql"
    image: "mcr.microsoft.com/mssql/server:2022-latest"
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA}
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    networks:
      sb-emulator:
        aliases:
          - "mssql"
  azurite:
    container_name: "azurite"
    image: mcr.microsoft.com/azure-storage/azurite:latest
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    networks:
      - sb-emulator

  cosmosdb:
    container_name: "cosmosdb-emulator"
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator
    restart: always
    environment:
      AZURE_COSMOS_EMULATOR_PARTITION_COUNT: 10
      AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE: "true"
      AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE: ${AZURE_COSMOS_EMULATOR_IP_ADDRESS_OVERRIDE:-"0.0.0.0"}
    ports:
      - "8081:8081"
      - "10255:10255"
      - "10251:10251"
      - "10252:10252"
      - "10253:10253"
      - "10254:10254"
    networks:
      - sb-emulator
  email-processing:
    container_name: "email-processing-service"
    image: carclinchda/email-processing-service:latest
    environment:
      FUNCTIONS_WORKER_RUNTIME_VERSION: "3.12"
      AZURE_FUNCTIONS_ENVIRONMENT: "Development"
      WEBSITE_HOSTNAME: "localhost:80"
      AzureWebJobsStorage: "UseDevelopmentStorage=true;DevelopmentStorageProxyUri=http://azurite"
      AzureWebJobsServiceBus: ${SERVICE_BUS_CONNECTION_STRING}
      COSMOS_CONNECTION_STRING: ${COSMOS_CONNECTION_STRING}
      COSMOS_DB_NAME: "${COSMOS_DB_NAME:-CarClinchDB}"
      COSMOS_VERIFY_SSL: "false" # Must be false for local emulator
      GMAIL_USER: "${GMAIL_USER}"
      GMAIL_APP_PASSWORD: "${GMAIL_APP_PASSWORD}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL}"
      OPENAI_MODEL_NAME: "${OPENAI_MODEL_NAME}"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-""}
    depends_on:
      - servicebus
      - azurite
      - cosmosdb
    networks:
      - sb-emulator

networks:
  sb-emulator: